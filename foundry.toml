# =============================================================================
# Foundry configuration for Univocity
# =============================================================================
#
# Profile usage:
#   - default: Protocol development and deployment (optimizer ON, via_ir ON)
#   - factory:  CREATE3Factory bytecode settings only; main project is NOT built
#               with this profile. Use script/create3-factory/ for factory build.
#   - ci:       Same as default; used when FOUNDRY_PROFILE=ci in CI.
#
# Examples:
#   forge build
#   forge test
#   forge build --config-path script/create3-factory/foundry.toml  # factory only
#
# =============================================================================

[fmt]
# Match standing formatting rules: soft 79, hard 100 for comments (.cursorrules)
line_length = 79

[lint]
# Disable automatic linting during builds
lint_on_build = false

# Disable style-related warnings
exclude_lints = [
  "mixed-case-function",
  "mixed-case-variable",
  "screaming-snake-case-immutable",
  "screaming-snake-case-const",
  "pascal-case-struct",
]

[profile.default]

solc_version = "0.8.30"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200

# Better optimizations and stack handling (community default for new projects).
# UUPS proxy deployment address is stable: it is derived only from CREATE3
# (factory + deployer + salt), not from implementation bytecode.
via_ir = true

# Metadata: Keep IPFS hash for Etherscan/Sourcify verification
bytecode_hash = "ipfs"
cbor_metadata = true

src = "src"
out = "out"
libs = ["lib"]

cache_path = "cache"

# for static analysis and audit
ast = true

build_info = true
build_info_path = "out/build-info"

# for audit tools and upgrade safety checks 
extra_output = [
  "storageLayout",
  "evm.bytecode.sourceMap",
  "evm.deployedBytecode.sourceMap",
]

ffi = true

# Restrict filesystem access to specific paths
fs_permissions = [
  { access = "read", path = "./out" },
  { access = "read", path = "./cache" },
  { access = "read", path = "./deployment.json" },
  { access = "read", path = "./script/create3-factory/out" },
]

# ---- Import Remappings ----
remappings = [
  "forge-std/=lib/forge-std/src/",
  "@forge-std/=lib/forge-std/src/",
  "@univocity/=src/",
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "witnet-solidity-bridge/=lib/witnet-solidity-bridge/",
  "solmate/=lib/solmate/src/",
]

ignored_warnings_from = ["test/**", "script/**"]

# CI profile: same as default. Used when FOUNDRY_PROFILE=ci in .github/workflows.
[profile.ci]
solc_version = "0.8.30"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
bytecode_hash = "ipfs"
cbor_metadata = true
src = "src"
out = "out"
libs = ["lib"]
cache_path = "cache"
ast = true
build_info = true
build_info_path = "out/build-info"
extra_output = [
  "storageLayout",
  "evm.bytecode.sourceMap",
  "evm.deployedBytecode.sourceMap",
]
ffi = true
fs_permissions = [
  { access = "read", path = "./out" },
  { access = "read", path = "./cache" },
  { access = "read", path = "./deployment.json" },
  { access = "read", path = "./script/create3-factory/out" },
]
remappings = [
  "forge-std/=lib/forge-std/src/",
  "@forge-std/=lib/forge-std/src/",
  "@univocity/=src/",
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "witnet-solidity-bridge/=lib/witnet-solidity-bridge/",
  "solmate/=lib/solmate/src/",
]
ignored_warnings_from = ["test/**", "script/**"]

# =============================================================================
# Factory Profile: CREATE3Factory deployment (STABILITY-LOCKED)
# =============================================================================
#
# CRITICAL: Settings in this profile affect factory deployment address.
#
# This profile defines the bytecode-control settings for deploying CREATE3Factory
# via Arachnid's CREATE2 proxy. The main project uses via_ir = true; the factory
# is built in isolation under script/create3-factory/ with via_ir = false for
# deterministic factory bytecode (see that foundry.toml).
#
# RULES:
#   1. NEVER change settings in this profile after first production deployment
#   2. ANY change will result in a different factory address on all chains
#   3. script/create3-factory/foundry.toml MUST mirror these settings exactly
#   4. Regular protocol contracts use [profile.default] and are unaffected
#
# Shared factory address (same salt as flip): 0x606A25c0432766B45ece27Dd4e2208A7cE14dC5b
#
# =============================================================================
[profile.factory]

# Inherit all settings from default, override only stability-critical settings

# CRITICAL: Remove metadata hash to prevent compiler version from affecting bytecode
# With bytecode_hash = "ipfs", any compiler version change would alter the factory address
# With bytecode_hash = "none", we can upgrade protocol to newer Solidity without issues
bytecode_hash = "none"

# Disable CBOR metadata encoding (redundant with bytecode_hash = none, but explicit)
cbor_metadata = false

# Explicitly disable optimizer for maximum bytecode stability
# Factory is small (~500 bytes), gas optimization is not critical
optimizer = false
optimizer_runs = 200 # Ignored when optimizer = false, but explicit for documentation

# CRITICAL: via_ir must be false for deterministic factory bytecode (matches flip).
# The main project is NOT built with this profile; only script/create3-factory/ is.
via_ir = false

# Build archives for contracts release via univocity-tools contract-artefacts.
# Local: UNIVOCITY_TOOLS_VERSION=v0.4.0 task contract-artefacts-release:release
version: "3"

vars:
  UNIVOCITY_TOOLS_VERSION: '{{.UNIVOCITY_TOOLS_VERSION | default "v0.4.0"}}'
  TOOLS_CACHE_DIR: "{{.ROOT_DIR}}/.cache/univocity-tools"
  CART_BIN: "{{.TOOLS_CACHE_DIR}}/contract-artefacts-linux-x64"
  WORK_DIR: "{{.ROOT_DIR}}/.work"

tasks:
  cart:ensure:
    desc: Download contract-artefacts-linux-x64 from univocity-tools release.
    vars:
      RELEASE_BASE: https://github.com/forestrie/univocity-tools/releases/download/{{.UNIVOCITY_TOOLS_VERSION}}
    cmds:
      - mkdir -p "{{.TOOLS_CACHE_DIR}}"
      - |
        set -euo pipefail
        BIN="{{.CART_BIN}}"
        if [ -x "$BIN" ]; then
          echo "contract-artefacts already present at $BIN"
          exit 0
        fi
        curl -fsSL "{{.RELEASE_BASE}}/contract-artefacts-linux-x64" -o "$BIN"
        curl -fsSL "{{.RELEASE_BASE}}/contract-artefacts-linux-x64.sha256" \
          -o "${BIN}.sha256"
        EXPECTED=$(awk '{print $1}' "${BIN}.sha256")
        ACTUAL=$(shasum -a 256 "$BIN" | awk '{print $1}')
        if [ "$EXPECTED" != "$ACTUAL" ]; then
          echo "contract-artefacts sha256 mismatch" >&2
          exit 1
        fi
        chmod +x "$BIN"

  build:create3-factory:
    desc: Build the isolated CREATE3 factory project.
    cmds:
      - forge build --config-path script/create3-factory/foundry.toml

  build:univocity:
    desc: Build the main protocol project (CI profile).
    env:
      FOUNDRY_PROFILE: ci
    cmds:
      - forge build --sizes

  archive:create3-factory:
    desc: Package CREATE3 factory build outputs into a release-id archive.
    deps: [cart:ensure, build:create3-factory]
    cmds:
      - |
        set -euo pipefail
        "{{.CART_BIN}}" archive \
          --source-root "{{.ROOT_DIR}}" \
          --forge-config script/create3-factory/foundry.toml \
          --archive-name create3-factory \
          --release-id ""

  archive:univocity:
    desc: Package protocol build outputs into a release-id archive.
    deps: [cart:ensure, build:univocity]
    cmds:
      - |
        set -euo pipefail
        "{{.CART_BIN}}" archive \
          --source-root "{{.ROOT_DIR}}" \
          --archive-name univocity \
          --release-id ""

  validate:create3-factory:
    desc: Round-trip validate the CREATE3 factory build archive.
    deps: [archive:create3-factory]
    cmds:
      - |
        set -euo pipefail
        shopt -s nullglob
        archives=("{{.WORK_DIR}}"/create3-factory-*.tar.gz)
        if [ "${#archives[@]}" -ne 1 ]; then
          echo "expected one create3-factory archive in {{.WORK_DIR}}" >&2
          exit 1
        fi
        ARCHIVE_FILE=$(basename "${archives[0]}")
        EXTRACT_DIR="{{.WORK_DIR}}/validate-extract-create3-factory"
        rm -rf "$EXTRACT_DIR"
        mkdir -p "$EXTRACT_DIR"
        "{{.CART_BIN}}" archive-extract "$ARCHIVE_FILE" \
          --source-root "{{.ROOT_DIR}}" \
          --release-root "$EXTRACT_DIR"
        "{{.CART_BIN}}" archive-validate \
          --source-root "{{.ROOT_DIR}}" \
          --forge-config script/create3-factory/foundry.toml \
          --release-root "$EXTRACT_DIR"

  validate:univocity:
    desc: Round-trip validate the protocol build archive.
    deps: [archive:univocity]
    cmds:
      - |
        set -euo pipefail
        shopt -s nullglob
        archives=("{{.WORK_DIR}}"/univocity-*.tar.gz)
        if [ "${#archives[@]}" -ne 1 ]; then
          echo "expected one univocity archive in {{.WORK_DIR}}" >&2
          exit 1
        fi
        ARCHIVE_FILE=$(basename "${archives[0]}")
        EXTRACT_DIR="{{.WORK_DIR}}/validate-extract-univocity"
        rm -rf "$EXTRACT_DIR"
        mkdir -p "$EXTRACT_DIR"
        "{{.CART_BIN}}" archive-extract "$ARCHIVE_FILE" \
          --source-root "{{.ROOT_DIR}}" \
          --release-root "$EXTRACT_DIR"
        "{{.CART_BIN}}" archive-validate \
          --source-root "{{.ROOT_DIR}}" \
          --release-root "$EXTRACT_DIR"

  release:
    desc: Build, archive, and validate both protocol and CREATE3 factory.
    cmds:
      - task: validate:create3-factory
      - task: validate:univocity
      - |
        set -euo pipefail
        ls -la "{{.WORK_DIR}}"/univocity-*.tar.gz "{{.WORK_DIR}}"/create3-factory-*.tar.gz

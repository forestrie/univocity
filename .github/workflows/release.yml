name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tools_version:
        description: "univocity-tools release tag"
        required: false
        default: "v0.3.0"
        type: string

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    name: Build archives and publish
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: "v1.5.1"

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build, archive, and validate
        env:
          UNIVOCITY_TOOLS_VERSION: ${{ inputs.tools_version || 'v0.3.0' }}
        run: task contract-artefacts-release:release

      - name: Prepare release assets
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p release
          for name in univocity create3-factory; do
            asset="${name}-${RELEASE_TAG}.tar.gz"
            cp ".work/${name}.tar.gz" "release/${asset}"
            ( cd release && shasum -a 256 "${asset}" > "${asset}.sha256" )
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/*.tar.gz.sha256

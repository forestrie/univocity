name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tools_version:
        description: "univocity-tools release tag"
        required: false
        default: "v0.3.0"
        type: string

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    name: Build archives and publish
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: "v1.5.1"

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build, archive, and validate
        env:
          UNIVOCITY_TOOLS_VERSION: ${{ inputs.tools_version || 'v0.3.0' }}
        run: task contract-artefacts-release:release

      - name: Prepare release assets
        env:
          CART_BIN: ${{ github.workspace }}/.cache/univocity-tools/contract-artefacts-linux-x64
        run: |
          set -euo pipefail
          mkdir -p release
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RELEASE_SUFFIX="${GITHUB_REF_NAME}"
          else
            RELEASE_SUFFIX="$("$CART_BIN" release-id --source-root "${GITHUB_WORKSPACE}")"
          fi
          for name in univocity create3-factory; do
            asset="${name}-${RELEASE_SUFFIX}.tar.gz"
            cp ".work/${name}.tar.gz" "release/${asset}"
            ( cd release && shasum -a 256 "${asset}" > "${asset}.sha256" )
            mkdir -p "upload/${name}"
            cp "release/${asset}" "upload/${name}/${asset}"
          done

      - name: Upload workflow artefacts
        uses: actions/upload-artifact@v4
        with:
          name: univocity
          path: upload/univocity/*.tar.gz
          if-no-files-found: error

      - name: Upload CREATE3 factory workflow artefact
        uses: actions/upload-artifact@v4
        with:
          name: create3-factory
          path: upload/create3-factory/*.tar.gz
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/*.tar.gz.sha256

# =============================================================================
# Isolated CREATE3Factory build — MUST mirror main foundry.toml [profile.factory]
# =============================================================================
#
# This config produces the deterministic factory bytecode used by
# DeployCreate3Factory.s.sol (read from out/). All CREATE3 code is in-repo:
#   - lib/solmate/src/utils/CREATE3.sol, Bytes32AddressLib.sol (duplicated from
#     solmate for full bytecode control; same as flip-contracts)
#   - CREATE3Factory.sol, ICREATE3Factory.sol (same logic as flip-contracts)
# Settings here MUST match the main repo's [profile.factory] so that the
# shared factory address 0x606A25c0432766B45ece27Dd4e2208A7cE14dC5b is
# preserved when using the same Arachnid salt.
#
# RULES (same as main [profile.factory]):
#   1. NEVER change settings after first production deployment
#   2. ANY change will result in a different factory address on all chains
#
# Run from repo root: forge build --config-path script/create3-factory/foundry.toml
#
# =============================================================================

[profile.default]
solc_version = "0.8.30"
evm_version = "cancun"

# Mirror [profile.factory]: stability-locked bytecode
bytecode_hash = "none"
cbor_metadata = false
optimizer = false
optimizer_runs = 200
via_ir = false

src = "."
out = "out"
libs = ["lib"]
remappings = ["solmate/=lib/solmate/src/"]
